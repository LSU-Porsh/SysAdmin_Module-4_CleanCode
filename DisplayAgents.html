<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valorant Agents Display Example</title>
    <link rel="stylesheet" href="DisplayAgent.css" />
    <style></style>
  </head>
  <body>
    <div class="grid-cont">
      <div id="profilelist-container"></div>
      <div id="agentDisplay-container">
        <!-- uses div to display the image as backgrounds -->

        <div class="display-wrapper">
          <h2 class="hero-name">ASTRA</h2>
          <div class="imageDisplay"></div>
          <!-- character art -->

          <!-- info box -->

          <div class="ability-container">
            <h2 class="role-class">Controller</h2>
            <h2 class="hero-name-2">ASTRA</h2>
            <h2 class="sub-title">ABILITIES</h2>
            <div class="ability-icons"></div>
            <div class="ability-desc">
              <h3 class="abiName">Ability Name</h3>
              <p>Lorem ipsum dolor sit amet...</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="agents.js"></script>
  </body>
</html>
